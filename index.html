<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Front End Companion</title>
  <link rel="stylesheet" href="main.css?v=018">
  <link rel="stylesheet" href="print.css?v=018" media="print">
</head>
<body>
<header>
  <b>STORE 2072 · ASCOT</b>
  <h1>Front End Companion</h1>
  <button type="button" id="printButton">Print / Save PDF</button>
</header>
<main>
  <section id="setup">
    <h2>Build Monday</h2>
    <p class="buildnote" id="buildNote"></p>
    <label>Daily Grid PDF<input id="grid" type="file" accept="application/pdf,.pdf"></label>
    <label>Daily Grid Summary PDF<input id="summary" type="file" accept="application/pdf,.pdf"></label>
    <p id="status" aria-live="polite">Choose both reports.</p>
    <button id="build" type="button" disabled>Build Monday</button>
  </section>

  <section id="result" hidden>
    <h2 id="date"></h2>
    <p id="stats"></p>

    <div id="plannerViewport" class="planner-viewport">
      <div id="plannerScaler" class="planner-scaler">
        <article id="planner">
          <div class="head">
            <b>TEAM</b><span>06</span><span>08</span><span>10</span><span>12</span>
            <span>14</span><span>16</span><span>18</span><span>20</span><span>22</span>
          </div>
          <div id="rows"></div>
          <div class="legend"><span class="legend-meal">M</span> Meal break</div>
          <div class="demand"><b>SCO TARGET</b><div id="sco"></div></div>
          <footer id="plannerFooter"></footer>
        </article>
      </div>
    </div>

    <button type="button" id="startAgain">Start again</button>
  </section>
</main>
<script type="module" src="app.js?v=018"></script>
</body>
</html>
