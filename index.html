<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Front End Companion</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/print.css" media="print">
</head>
<body>
<main class="sheet">
<header class="masthead">
  <section><p class="kicker">Front End Companion</p><h1 id="pageTitle">Monday</h1><p id="pageDate" class="date-line"></p></section>
  <section class="meta">
    <div><span>Store</span><strong id="storeMeta"></strong></div>
    <div><span>Financial week</span><strong id="financialWeek"></strong></div>
    <button id="printButton">Print / Save PDF</button>
  </section>
</header>
<section class="planner">
  <div class="planner-head"><div class="identity-head">Team member</div><div id="timelineHead" class="timeline-head"></div></div>
  <div id="staffRows"></div>
  <div class="sco-row">
    <div class="identity-card"><div class="initial-badge">S</div><div><strong>SCO demand</strong><span>Required operators</span></div></div>
    <div id="scoDemandTrack" class="timeline-track square-track"></div>
  </div>
</section>
<footer><span id="footerStore"></span><span>Front End Companion</span><span id="footerWeek"></span></footer>
</main>
<script src="js/app.js"></script>
</body>
</html>
